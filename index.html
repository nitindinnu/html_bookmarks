<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nitin Dinnu Bookmarks</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤷</text></svg>">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-hover: rgba(255, 255, 255, 0.95);
            --text-main: #2C3E50;
            --text-muted: #7F8C8D;
            --popup-bg: #ffffff;
            --input-bg: #ffffff;
            --input-border: #ddd;
            --search-bg: rgba(255, 255, 255, 0.6);
            --search-focus: rgba(255, 255, 255, 0.9);
            --category-border: rgba(0,0,0,0.1);
            --primary-color: #4A90E2;
            --secondary: #9b59b6;
        }

        body.dark-mode {
            --bg-gradient: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            --card-bg: rgba(30, 35, 45, 0.6);
            --card-hover: rgba(45, 55, 70, 0.95);
            --text-main: #e0e0e0;
            --text-muted: #95a5a6;
            --popup-bg: #1e232d;
            --input-bg: #2a313c;
            --input-border: #444;
            --search-bg: rgba(30, 35, 45, 0.5);
            --search-focus: rgba(45, 55, 70, 0.9);
            --category-border: rgba(255,255,255,0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            margin: 0;
            height: 100vh;
            background: var(--bg-gradient);
            color: var(--text-main);
            overflow: hidden;
            transition: background 0.5s ease, color 0.3s ease;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 4px; }
        body.dark-mode ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); }

        .top-bar { width: 100%; padding: 20px 5%; box-sizing: border-box; display: flex; justify-content: center; align-items: center; gap: 15px; }
        .search-input { flex-grow: 1; max-width: 600px; padding: 15px 25px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.2); background: var(--search-bg); backdrop-filter: blur(10px); font-size: 16px; font-family: 'Inter', sans-serif; color: var(--text-main); outline: none; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .search-input::placeholder { color: var(--text-muted); }
        .search-input:focus { background: var(--search-focus); border-color: var(--primary-color); box-shadow: 0 4px 20px rgba(74, 144, 226, 0.2); }

        .theme-toggle { flex-shrink: 0; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.2); color: var(--text-main); width: 45px; height: 45px; border-radius: 50%; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: all 0.3s ease; }
        .theme-toggle:hover { transform: rotate(15deg) scale(1.1); background: var(--card-hover); }

        .grid { display: flex; flex-direction: column; width: 100%; padding: 10px 5% 100px; box-sizing: border-box; overflow-y: auto; }
        .category { width: 100%; margin-bottom: 25px; }
        .category-title { font-size: 18px; font-weight: 700; margin-bottom: 15px; color: var(--text-main); border-bottom: 2px solid var(--category-border); padding-bottom: 8px; display: inline-block; transition: border-color 0.3s ease; }
        .bookmark-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; width: 100%; align-items: stretch; }

        /* Updated Bookmark Card to stretch naturally instead of strictly 1:1 */
        .bookmark { 
            width: 100%; 
            height: 100%; 
            min-height: 110px;
            background: var(--card-bg); 
            backdrop-filter: blur(10px); 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            text-align: center; border-radius: 16px; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            cursor: pointer; position: relative; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
            padding: 15px 10px; box-sizing: border-box; 
        }
        .bookmark:hover { transform: translateY(-5px); background: var(--card-hover); box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2); }
        .bookmark img { width: 40px; height: 40px; object-fit: contain; margin-bottom: 12px; border-radius: 8px; background: transparent; transition: transform 0.3s ease; flex-shrink: 0; }
        .bookmark:hover img { transform: scale(1.1); }
        
        /* Updated Title to wrap text automatically */
        .bookmark-title { 
            font-size: 12px; 
            font-weight: 600; 
            width: 100%; 
            white-space: normal; 
            word-wrap: break-word; 
            overflow-wrap: break-word; 
            line-height: 1.4; 
        }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); z-index: 999; }
        .popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--popup-bg); color: var(--text-main); padding: 25px; border-radius: 16px; z-index: 1000; width: 90%; max-width: 350px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); transition: background 0.3s ease; box-sizing: border-box; }
        .popup h3 { margin-top: 0; font-size: 18px; }
        .popup input, .popup select { width: 100%; margin-bottom: 12px; padding: 10px; background: var(--input-bg); color: var(--text-main); border: 1px solid var(--input-border); border-radius: 8px; box-sizing: border-box; font-family: 'Inter', sans-serif; font-size: 14px; }
        .popup input:focus, .popup select:focus { border-color: var(--primary-color); outline: none; }
        .popup-actions { display: flex; gap: 10px; margin-top: 5px; }
        .popup button { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600;}
        #popupSubmit { background: var(--primary-color); color: white; }
        .close-btn { background: var(--input-bg); color: var(--text-main); border: 1px solid var(--input-border) !important;}

        .fab-container { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 12px; }
        .fab-btn { color: white; border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); transition: transform 0.2s; }
        .fab-btn:hover { transform: scale(1.1); }
        .add-btn { background: var(--primary-color); }
        .import-btn { background: var(--secondary); font-size: 18px; }
        
        .no-results { width: 100%; text-align: center; color: var(--text-muted); font-size: 16px; margin-top: 40px; font-weight: 600; }

        @media (min-width: 768px) {
            .top-bar { padding: 30px 40px 10px; }
            .grid { padding: 20px 40px 40px; }
            .bookmark-container { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 20px; }
            .bookmark img { width: 48px; height: 48px; margin-bottom: 12px; }
            .bookmark-title { font-size: 14px; }
            .fab-container { bottom: 30px; right: 30px; gap: 15px; }
            .fab-btn { width: 56px; height: 56px; font-size: 24px; }
        }
    </style>
</head>
<body class="dark-mode">

    <div class="top-bar">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search by title or URL...">
        <button id="themeToggle" class="theme-toggle" title="Toggle Theme" onclick="toggleTheme()">☀️</button>
    </div>

    <div class="overlay" id="overlay" onclick="hidePopup()"></div>
    <div class="popup" id="popup">
        <h3 id="popupTitle">Add Bookmark</h3>
        <input type="text" id="title" placeholder="Website Name" required>
        <input type="url" id="url" placeholder="https://..." required>
        <select id="category"></select>
        <input type="text" id="newCategory" placeholder="Or create new category...">
        <div class="popup-actions">
            <button class="close-btn" onclick="hidePopup()">Cancel</button>
            <button id="popupSubmit" onclick="addBookmark()">Save</button>
        </div>
    </div>
    
    <div id="bookmarkContainer" class="grid"></div>
    
    <input type="file" id="excelUpload" accept=".xlsx, .xls, .csv" style="display: none;">
    
    <div class="fab-container">
        <button class="fab-btn import-btn" onclick="document.getElementById('excelUpload').click()" title="Import manually">📥</button>
        <button class="fab-btn add-btn" onclick="showPopup()" title="Add Manually">➕</button>
    </div>
    
    <script>
        const defaultImage = `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2395a5a6'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z'/%3E%3C/svg%3E`;

        document.addEventListener("DOMContentLoaded", async () => {
            initTheme(); 
            
            // Auto-fetch is active and running on load
            await autoFetchFromExcel();
            
            updateCategoryDropdown();
            renderBookmarks();

            document.getElementById('searchInput').addEventListener('input', (e) => {
                renderBookmarks(e.target.value);
            });
        });

        // Auto-Fetch function
        async function autoFetchFromExcel() {
            try {
                const response = await fetch(`./bookmarks.xlsx?ts=${Date.now()}`, { cache: 'no-store' });
                if (!response.ok) return; 
                
                const arrayBuffer = await response.arrayBuffer();
                const workbook = XLSX.read(arrayBuffer, { type: 'array' });
                const sheetName = workbook.SheetNames[0];
                const fetchedBookmarks = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);
                
                const storedBookmarks = JSON.parse(localStorage.getItem("bookmarks")) || [];
                let hasChanges = false;

                fetchedBookmarks.forEach(importBmk => {
                    if(importBmk.title && importBmk.url) {
                        if (!storedBookmarks.some(b => b.url === importBmk.url)) {
                            const autoFetchedImage = getFaviconUrl(importBmk.url); 
                            let cat = importBmk.category || "General";
                            
                            storedBookmarks.push({
                                title: importBmk.title,
                                url: importBmk.url,
                                category: cat,
                                image: autoFetchedImage
                            });
                            hasChanges = true;
                        }
                    }
                });

                if(hasChanges) {
                    localStorage.setItem("bookmarks", JSON.stringify(storedBookmarks));
                }

            } catch (error) {
                console.warn("Could not auto-fetch bookmarks.xlsx.");
            }
        }

        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const themeBtn = document.getElementById('themeToggle');
            if (savedTheme === 'light') {
                document.body.classList.remove('dark-mode');
                themeBtn.textContent = '🌙';
            } else {
                document.body.classList.add('dark-mode');
                themeBtn.textContent = '☀️';
            }
        }

        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark-mode');
            const themeBtn = document.getElementById('themeToggle');
            themeBtn.textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        document.getElementById('excelUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const sheetName = workbook.SheetNames[0];
                    const importedBookmarks = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);
                    
                    const storedBookmarks = JSON.parse(localStorage.getItem("bookmarks")) || [];
                    let addedCount = 0;

                    importedBookmarks.forEach(importBmk => {
                        if(importBmk.title && importBmk.url) {
                            if (!storedBookmarks.some(b => b.url === importBmk.url)) {
                                const autoFetchedImage = getFaviconUrl(importBmk.url); 
                                let cat = importBmk.category || "Imported";
                                
                                storedBookmarks.push({
                                    title: importBmk.title,
                                    url: importBmk.url,
                                    category: cat,
                                    image: autoFetchedImage
                                });
                                addedCount++;
                            }
                        }
                    });

                    localStorage.setItem("bookmarks", JSON.stringify(storedBookmarks));
                    updateCategoryDropdown();
                    document.getElementById('searchInput').value = "";
                    renderBookmarks();
                    alert(`Successfully imported ${addedCount} new bookmarks!`);
                } catch (error) {
                    alert("Failed to parse the file.");
                }
                document.getElementById('excelUpload').value = ''; 
            };
            reader.readAsArrayBuffer(file);
        });

        function getFaviconUrl(url) {
            try {
                let domain = new URL(url).hostname;
                return `https://icons.duckduckgo.com/ip3/${domain}.ico`;
            } catch (error) {
                return defaultImage;
            }
        }

        function showPopup() {
            document.getElementById("popup").style.display = "block";
            document.getElementById("overlay").style.display = "block";
            document.getElementById("title").value = "";
            document.getElementById("url").value = "";
            document.getElementById("newCategory").value = "";
        }

        function hidePopup() {
            document.getElementById("popup").style.display = "none";
            document.getElementById("overlay").style.display = "none";
        }

        function addBookmark() {
            const title = document.getElementById("title").value.trim();
            const url = document.getElementById("url").value.trim();
            let category = document.getElementById("newCategory").value.trim() || document.getElementById("category").value;
            
            if (!title || !url) return alert("Title and URL are required!");
            if (!category) category = "General";

            const image = getFaviconUrl(url);
            const bookmarks = JSON.parse(localStorage.getItem("bookmarks")) || [];
            bookmarks.push({ title, url, category, image });
            localStorage.setItem("bookmarks", JSON.stringify(bookmarks));
            
            updateCategoryDropdown();
            hidePopup();
            renderBookmarks(document.getElementById('searchInput').value);
        }

        function updateCategoryDropdown() {
            const bookmarks = JSON.parse(localStorage.getItem("bookmarks")) || [];
            const categories = [...new Set(bookmarks.map(b => b.category))];
            const select = document.getElementById("category");
            
            if(categories.length === 0) categories.push("General", "Work", "Entertainment", "Education");
            select.innerHTML = categories.map(cat => `<option value="${cat}">${cat}</option>`).join("");
        }

        function renderBookmarks(searchQuery = "") {
            const container = document.getElementById("bookmarkContainer");
            container.innerHTML = "";
            const bookmarks = JSON.parse(localStorage.getItem("bookmarks")) || [];
            
            const lowerQuery = searchQuery.toLowerCase();
            const filteredBookmarks = bookmarks.filter(b => 
                b.title.toLowerCase().includes(lowerQuery) || 
                b.url.toLowerCase().includes(lowerQuery)
            );

            if (filteredBookmarks.length === 0 && bookmarks.length > 0) {
                container.innerHTML = `<div class="no-results">No bookmarks found for "${searchQuery}"</div>`;
                return;
            }

            const categories = {};
            filteredBookmarks.forEach(({ title, url, category, image }) => {
                if (!categories[category]) categories[category] = [];
                categories[category].push({ title, url, image });
            });
            
            for (const [category, items] of Object.entries(categories)) {
                const categoryDiv = document.createElement("div");
                categoryDiv.classList.add("category");
                categoryDiv.innerHTML = `<div class='category-title'>${category}</div>`;
                
                const bookmarkContainer = document.createElement("div");
                bookmarkContainer.classList.add("bookmark-container");
                
                items.forEach(({ title, url, image }) => {
                    const div = document.createElement("div");
                    div.classList.add("bookmark");
                    div.innerHTML = `
                        <img src='${image}' onerror='this.src="${defaultImage}"' alt="${title} icon">
                        <div class='bookmark-title' title="${title}">${title}</div>`;
                        
                    div.onclick = () => { window.open(url, "_blank", "noopener,noreferrer"); };
                    bookmarkContainer.appendChild(div);
                });
                categoryDiv.appendChild(bookmarkContainer);
                container.appendChild(categoryDiv);
            }
        }
    </script>
</body>
</html>
